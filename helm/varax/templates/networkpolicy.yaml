{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "varax.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "varax.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "varax.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow Prometheus to scrape metrics
    - ports:
        - port: 8443
          protocol: TCP
      {{- if .Values.networkPolicy.metricsFrom }}
      from:
        {{- toYaml .Values.networkPolicy.metricsFrom | nindent 8 }}
      {{- end }}
    # Allow kubelet health probes
    - ports:
        - port: 8081
          protocol: TCP
  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow Kubernetes API server
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    {{- if .Values.cloudProvider.aws.enabled }}
    # Allow AWS API calls (HTTPS)
    - ports:
        - port: 443
          protocol: TCP
    {{- end }}
{{- end }}
