{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "varax.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "varax.labels" . | nindent 4 }}
  {{- $annotations := dict }}
  {{- with .Values.serviceAccount.annotations }}
  {{- $annotations = merge $annotations . }}
  {{- end }}
  {{- if .Values.cloudProvider.aws.enabled }}
  {{- with .Values.cloudProvider.aws.serviceAccount.annotations }}
  {{- $annotations = merge $annotations . }}
  {{- end }}
  {{- end }}
  {{- if $annotations }}
  annotations:
    {{- toYaml $annotations | nindent 4 }}
  {{- end }}
# Token mounting is controlled at the pod level (deployment.yaml sets it to
# true because the operator needs API access). Setting false here would be
# overridden by the pod-level spec and mislead security reviewers.
{{- end }}
