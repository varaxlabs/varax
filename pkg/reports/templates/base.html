<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.ReportTitle}} - Varax</title>
    <style>{{css}}</style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">VARAX</div>
        <div class="header-meta">
            <div>{{.ClusterName}}</div>
            <div>{{formatDate .GeneratedAt}}</div>
        </div>
    </div>

    {{template "content" .}}

    <div class="footer">
        <div>Generated by Varax {{.VaraxVersion}} on {{formatTime .GeneratedAt}}</div>
        <div class="disclaimer">This report is generated from automated compliance checks and should be reviewed by qualified personnel.</div>
    </div>
</div>
</body>
</html>
